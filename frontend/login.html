<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WILLSBLOG | Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-gray-900 text-white border-b border-gray-800">
    <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
      <a href="index.html" class="text-2xl font-bold tracking-wide">WILLSBLOG</a>

      <nav>
        <ul class="flex flex-wrap items-center gap-3 text-sm md:text-base">
          <li>
            <a href="index.html" class="px-3 py-2 rounded-md hover:bg-gray-800 transition">
              Home
            </a>
          </li>
          <li>
            <a href="allblogs.html" class="px-3 py-2 rounded-md hover:bg-gray-800 transition">
              All Blogs
            </a>
          </li>
          <li>
            <a href="login.html" class="px-3 py-2 rounded-md bg-gray-800 hover:bg-gray-700 transition">
              Login
            </a>
          </li>
          <li>
            <a href="register.html" class="px-3 py-2 rounded-md border border-gray-600 hover:bg-gray-800 transition">
              Register
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main class="flex-1 flex items-center justify-center px-4 py-10">
    <section class="w-full max-w-md bg-white border rounded-xl shadow-sm p-6 md:p-8">
      <div class="mb-6 text-center">
        <h1 class="text-2xl md:text-3xl font-bold mb-2">Login</h1>
        <p class="text-sm text-gray-600">
          Access your WILLSBLOG account to continue reading and manage your activity.
        </p>
      </div>

      <form action="login" method="POST" class="space-y-5">
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
            Username
          </label>
          <input
            type="text"
            id="username"
            name="username"
            required
            class="w-full border border-gray-300 rounded-md px-4 py-3 outline-none focus:border-blue-500"
            placeholder="Enter your username"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
            Password
          </label>
          <input
            type="password"
            id="password"
            name="password"
            required
            class="w-full border border-gray-300 rounded-md px-4 py-3 outline-none focus:border-blue-500"
            placeholder="Enter your password"
          />
        </div>

        <button
          type="submit"
          class="w-full bg-gray-900 text-white py-3 rounded-md font-medium hover:bg-gray-800 transition"
        >
          Login
        </button>
      </form>

      <p class="text-sm text-center text-gray-600 mt-6">
        Don’t have an account?
        <a href="register.html" class="text-blue-600 font-medium hover:underline">Register</a>
      </p>
    </section>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-900 text-gray-300">
    <div class="max-w-6xl mx-auto px-4 py-6 text-sm flex flex-col gap-2 md:flex-row md:items-center md:justify-between">
      <p>&copy; 2026 WILLSBLOG. All rights reserved.</p>
      <p>Built for learning Django deeply.</p>
    </div>
  </footer>

</body>
</html>
