<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WILLSBLOG | Register</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-gray-900 text-white border-b border-gray-800">
    <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
      <a href="index.html" class="text-2xl font-bold tracking-wide">WILLSBLOG</a>

      <nav>
        <ul class="flex flex-wrap items-center gap-3 text-sm md:text-base">
          <li>
            <a href="index.html" class="px-3 py-2 rounded-md hover:bg-gray-800 transition">
              Home
            </a>
          </li>
          <li>
            <a href="allblogs.html" class="px-3 py-2 rounded-md hover:bg-gray-800 transition">
              All Blogs
            </a>
          </li>
          <li>
            <a href="login.html" class="px-3 py-2 rounded-md hover:bg-gray-800 transition">
              Login
            </a>
          </li>
          <li>
            <a href="register.html" class="px-3 py-2 rounded-md bg-gray-800 hover:bg-gray-700 transition">
              Register
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main class="flex-1 flex items-center justify-center px-4 py-10">
    <section class="w-full max-w-2xl bg-white border rounded-xl shadow-sm p-6 md:p-8">
      <div class="mb-6 text-center">
        <h1 class="text-2xl md:text-3xl font-bold mb-2">Create Account</h1>
        <p class="text-sm text-gray-600">
          Join WILLSBLOG to access free posts and purchase premium content.
        </p>
      </div>

      <form action="register" method="POST" class="space-y-5">
        <div class="grid gap-5 md:grid-cols-2">
          <div>
            <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
              Username
            </label>
            <input
              type="text"
              id="username"
              name="username"
              required
              class="w-full border border-gray-300 rounded-md px-4 py-3 outline-none focus:border-blue-500"
              placeholder="Choose a username"
            />
          </div>

          <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
              Email
            </label>
            <input
              type="email"
              id="email"
              name="email"
              required
              class="w-full border border-gray-300 rounded-md px-4 py-3 outline-none focus:border-blue-500"
              placeholder="Enter your email"
            />
          </div>
        </div>

        <div class="grid gap-5 md:grid-cols-2">
          <div>
            <label for="first_name" class="block text-sm font-medium text-gray-700 mb-2">
              First Name
            </label>
            <input
              type="text"
              id="first_name"
              name="first_name"
              required
              class="w-full border border-gray-300 rounded-md px-4 py-3 outline-none focus:border-blue-500"
              placeholder="First name"
            />
          </div>

          <div>
            <label for="last_name" class="block text-sm font-medium text-gray-700 mb-2">
              Last Name
            </label>
            <input
              type="text"
              id="last_name"
              name="last_name"
              required
              class="w-full border border-gray-300 rounded-md px-4 py-3 outline-none focus:border-blue-500"
              placeholder="Last name"
            />
          </div>
        </div>

        <div class="grid gap-5 md:grid-cols-2">
          <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
              Password
            </label>
            <input
              type="password"
              id="password"
              name="password"
              required
              class="w-full border border-gray-300 rounded-md px-4 py-3 outline-none focus:border-blue-500"
              placeholder="Create a password"
            />
          </div>

          <div>
            <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-2">
              Confirm Password
            </label>
            <input
              type="password"
              id="confirm_password"
              name="confirm_password"
              required
              class="w-full border border-gray-300 rounded-md px-4 py-3 outline-none focus:border-blue-500"
              placeholder="Confirm your password"
            />
          </div>
        </div>

        <button
          type="submit"
          class="w-full bg-gray-900 text-white py-3 rounded-md font-medium hover:bg-gray-800 transition"
        >
          Register
        </button>
      </form>

      <p class="text-sm text-center text-gray-600 mt-6">
        Already have an account?
        <a href="login.html" class="text-blue-600 font-medium hover:underline">Login</a>
      </p>
    </section>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-900 text-gray-300">
    <div class="max-w-6xl mx-auto px-4 py-6 text-sm flex flex-col gap-2 md:flex-row md:items-center md:justify-between">
      <p>&copy; 2026 WILLSBLOG. All rights reserved.</p>
      <p>Built for learning Django deeply.</p>
    </div>
  </footer>

</body>
</html>
